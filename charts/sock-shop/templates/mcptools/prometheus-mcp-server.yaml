{{- if .Values.mcpTools.prometheusMcpServer.enabled }}
---
# ServiceAccount for Prometheus MCP Server
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.mcpTools.prometheusMcpServer.name }}
  namespace: {{ .Values.namespaces.sockShop }}
  labels:
    app: {{ .Values.mcpTools.prometheusMcpServer.name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}

---
# ConfigMap for Prometheus MCP Server configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.mcpTools.prometheusMcpServer.name }}-config
  namespace: {{ .Values.namespaces.sockShop }}
  labels:
    app: {{ .Values.mcpTools.prometheusMcpServer.name }}
data:
  {{- if .Values.mcpTools.prometheusMcpServer.config.prometheusUrl }}
  PROMETHEUS_URL: {{ .Values.mcpTools.prometheusMcpServer.config.prometheusUrl | quote }}
  {{- else }}
  PROMETHEUS_URL: "http://prometheus.{{ .Values.namespaces.monitoring }}.svc.cluster.local:{{ .Values.monitoring.prometheus.service.port }}"
  {{- end }}
  PROMETHEUS_MCP_SERVER_TRANSPORT: {{ .Values.mcpTools.prometheusMcpServer.config.transport | quote }}
  PROMETHEUS_MCP_BIND_HOST: {{ .Values.mcpTools.prometheusMcpServer.config.bindHost | quote }}
  PROMETHEUS_MCP_BIND_PORT: {{ .Values.mcpTools.prometheusMcpServer.config.bindPort | quote }}
  PROMETHEUS_REQUEST_TIMEOUT: {{ .Values.mcpTools.prometheusMcpServer.config.requestTimeout | quote }}
  PROMETHEUS_URL_SSL_VERIFY: {{ .Values.mcpTools.prometheusMcpServer.config.sslVerify | quote }}
  PROMETHEUS_DISABLE_LINKS: {{ .Values.mcpTools.prometheusMcpServer.config.disableLinks | quote }}

---
# Secret for Prometheus authentication (optional)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mcpTools.prometheusMcpServer.name }}-secret
  namespace: {{ .Values.namespaces.sockShop }}
  labels:
    app: {{ .Values.mcpTools.prometheusMcpServer.name }}
type: Opaque
stringData:
  {{- if .Values.mcpTools.prometheusMcpServer.auth.username }}
  PROMETHEUS_USERNAME: {{ .Values.mcpTools.prometheusMcpServer.auth.username | quote }}
  {{- end }}
  {{- if .Values.mcpTools.prometheusMcpServer.auth.password }}
  PROMETHEUS_PASSWORD: {{ .Values.mcpTools.prometheusMcpServer.auth.password | quote }}
  {{- end }}
  {{- if .Values.mcpTools.prometheusMcpServer.auth.token }}
  PROMETHEUS_TOKEN: {{ .Values.mcpTools.prometheusMcpServer.auth.token | quote }}
  {{- end }}
  {{- if .Values.mcpTools.prometheusMcpServer.auth.orgId }}
  ORG_ID: {{ .Values.mcpTools.prometheusMcpServer.auth.orgId | quote }}
  {{- end }}
  PLACEHOLDER: {{ .Values.mcpTools.prometheusMcpServer.auth.placeholder | default "unused" | quote }}

---
# ClusterRole with read access to K8s resources + Litmus CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.mcpTools.prometheusMcpServer.name }}
  labels:
    app: {{ .Values.mcpTools.prometheusMcpServer.name }}
rules:
  # K8s resources for resolving service endpoints and discovering targets
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Litmus Chaos CRDs (read-only for observing chaos experiment metrics)
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosexperiments", "chaosresults"]
    verbs: ["get", "list", "watch"]
  # Argo Workflow CRDs (read-only)
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "cronworkflows"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding to bind ServiceAccount to ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.mcpTools.prometheusMcpServer.name }}
  labels:
    app: {{ .Values.mcpTools.prometheusMcpServer.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.mcpTools.prometheusMcpServer.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.mcpTools.prometheusMcpServer.name }}
    namespace: {{ .Values.namespaces.sockShop }}

---
# Deployment for Prometheus MCP Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcpTools.prometheusMcpServer.name }}
  namespace: {{ .Values.namespaces.sockShop }}
  labels:
    app: {{ .Values.mcpTools.prometheusMcpServer.name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.mcpTools.prometheusMcpServer.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.mcpTools.prometheusMcpServer.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcpTools.prometheusMcpServer.name }}
    spec:
      serviceAccountName: {{ .Values.mcpTools.prometheusMcpServer.name }}
      containers:
        - name: {{ .Values.mcpTools.prometheusMcpServer.name }}
          image: {{ .Values.mcpTools.prometheusMcpServer.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Values.mcpTools.prometheusMcpServer.name }}-config
            - secretRef:
                name: {{ .Values.mcpTools.prometheusMcpServer.name }}-secret
          ports:
            - containerPort: {{ .Values.mcpTools.prometheusMcpServer.port }}
              name: http
              protocol: TCP
          resources:
            requests:
              memory: {{ .Values.mcpTools.prometheusMcpServer.resources.requests.memory | quote }}
              cpu: {{ .Values.mcpTools.prometheusMcpServer.resources.requests.cpu | quote }}
              ephemeral-storage: {{ .Values.mcpTools.prometheusMcpServer.resources.requests.ephemeralStorage | quote }}
            limits:
              memory: {{ .Values.mcpTools.prometheusMcpServer.resources.limits.memory | quote }}
              cpu: {{ .Values.mcpTools.prometheusMcpServer.resources.limits.cpu | quote }}
              ephemeral-storage: {{ .Values.mcpTools.prometheusMcpServer.resources.limits.ephemeralStorage | quote }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          securityContext:
            runAsUser: {{ .Values.mcpTools.prometheusMcpServer.securityContext.runAsUser }}
            runAsNonRoot: {{ .Values.mcpTools.prometheusMcpServer.securityContext.runAsNonRoot }}
            allowPrivilegeEscalation: {{ .Values.mcpTools.prometheusMcpServer.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.mcpTools.prometheusMcpServer.securityContext.readOnlyRootFilesystem }}

---
# Service for Prometheus MCP Server
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcpTools.prometheusMcpServer.name }}
  namespace: {{ .Values.namespaces.sockShop }}
  labels:
    app: {{ .Values.mcpTools.prometheusMcpServer.name }}
spec:
  type: {{ .Values.mcpTools.prometheusMcpServer.service.type }}
  ports:
    - port: {{ .Values.mcpTools.prometheusMcpServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.mcpTools.prometheusMcpServer.service.type "NodePort") .Values.mcpTools.prometheusMcpServer.service.nodePort }}
      nodePort: {{ .Values.mcpTools.prometheusMcpServer.service.nodePort }}
      {{- end }}
  selector:
    app: {{ .Values.mcpTools.prometheusMcpServer.name }}
{{- end }}
