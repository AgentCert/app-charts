{{- if .Values.sockShop.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    litmuschaos.io/chaos: "true"
  labels:
    app: sock-shop
    name: queue-master
  name: queue-master
  namespace: {{ include "sock-shop-litmus.sockShopNamespace" . }}
spec:
  replicas: {{ .Values.sockShop.queueMaster.replicas }}
  selector:
    matchLabels:
      app: sock-shop
      name: queue-master
  template:
    metadata:
      labels:
        app: sock-shop
        name: queue-master
    spec:
      containers:
      - image: {{ .Values.sockShop.queueMaster.image }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        name: queue-master
        ports:
        - containerPort: 80
          protocol: TCP
        resources:
          requests:
            cpu: {{ .Values.sockShop.queueMaster.resources.requests.cpu }}
            memory: {{ .Values.sockShop.queueMaster.resources.requests.memory }}
          limits:
            cpu: {{ .Values.sockShop.queueMaster.resources.limits.cpu }}
            memory: {{ .Values.sockShop.queueMaster.resources.limits.memory }}
        startupProbe:
          httpGet:
            path: /health
            port: 80
          failureThreshold: 200
          periodSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 3
{{- end }}
